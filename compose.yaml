services:
  dm-db:
    build:
      context: ./dm-db
    container_name: dm-db
    environment:
      POSTGRES_DB: dm
      POSTGRES_USER: dm
      POSTGRES_PASSWORD: change-me-bootstrap-password
    volumes:
      - dm_postgres_data:/var/lib/postgresql
    networks:
      - dm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dm -d dm"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/etc/postgres/certs/dm-db.crt
      - -c
      - ssl_key_file=/etc/postgres/certs/dm-db.key
      - -c
      - ssl_ca_file=/etc/postgres/certs/ca.crt
      - -c
      - hba_file=/etc/postgres/pg_hba.conf

  dm:
    build:
      context: ./dm
    container_name: dm-app
    depends_on:
      dm-db:
        condition: service_healthy
    ports:
      - "7000:7000"
    working_dir: /app
    volumes:
      - ./dm:/app
      - dm_node_modules:/app/node_modules
    environment:
      SERVICE_NAME: dm
      HOST: 0.0.0.0
      PORT: 7000

      SSL_CERT_PATH: /app/certs/dm.crt
      SSL_KEY_PATH: /app/certs/dm.key
      SSL_CA_PATH: /app/certs/ca.crt

      USER_SERVICE_HOST: user
      USER_SERVICE_PORT: 7000
      SOCIAL_SERVICE_HOST: social
      SOCIAL_SERVICE_PORT: 7000

      REALTIME_SERVICE_HOST: realtime
      REALTIME_SERVICE_PORT: 7443

      NOTIFICATION_SERVICE_HOST: notifications
      NOTIFICATION_SERVICE_PORT: 7000

      DATABASE_URL_RUNTIME: postgresql://dm@dm-db:5432/dm
      DB_SSL_CA_PATH: /app/certs/ca.crt
      DB_SSL_CERT_PATH: /app/certs/dm.crt
      DB_SSL_KEY_PATH: /app/certs/dm.key

      UPSTREAM_REQUEST_TIMEOUT_MS: 3000

      PRISMA_DATABASE_URL: postgresql://dm@dm-db:5432/dm?schema=public&sslmode=require&sslcert=/app/certs/ca.crt&sslidentity=/app/certs/dm.p12&sslaccept=strict
    networks:
      - dm_net
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"

  realtime:
    build:
      context: ./realtime
    container_name: realtime-app
    working_dir: /app
    volumes:
      - ./realtime:/app
      - realtime_node_modules:/app/node_modules
    environment:
      SERVICE_NAME: realtime

      HOST: 0.0.0.0
      PORT: 7100

      INTERNAL_HOST: 0.0.0.0
      INTERNAL_PORT: 7443
      INTERNAL_ALLOWED_CLIENT_CNS: dm,notifications

      SSL_CERT_PATH: /app/certs/realtime.crt
      SSL_KEY_PATH: /app/certs/realtime.key
      SSL_CA_PATH: /app/certs/ca.crt

      DM_SERVICE_HOST: dm
      DM_SERVICE_PORT: 7000

      NOTIFICATIONS_SERVICE_HOST: notifications
      NOTIFICATIONS_SERVICE_PORT: 7000

      UPSTREAM_REQUEST_TIMEOUT_MS: 3000

      WS_PATH: /ws
      WS_TOKEN_SECRET: change-me-ws-secret
      WS_AUTH_TIMEOUT_MS: 5000
      WS_HEARTBEAT_INTERVAL_MS: 30000
      WS_MAX_PAYLOAD_BYTES: 65536
    networks:
      - dm_net
    command: sh -c "npm install && npm run dev"

  ws-test:
    image: node:20-alpine
    container_name: ws-test
    depends_on:
      realtime:
        condition: service_started
    working_dir: /work
    environment:
      ENV: /work/.shrc
      WS_URL: wss://realtime:7100/ws
      WS_CA_PATH: /certs/ca.crt
      WS_TOKEN_SECRET: change-me-ws-secret
      WS_TEST_USER_ID: 019d3641-b111-7cc2-98c4-dc0c0f4a1111
      WS_TOKEN_TTL_SECONDS: 315360000
    volumes:
      - ./ws-test:/work
      - ./realtime/certs:/certs:ro
    networks:
      - dm_net
    command: sh -c "npm install -g wscat && tail -f /dev/null"

volumes:
  dm_postgres_data:
  dm_node_modules:
  realtime_node_modules:

networks:
  dm_net: