services:
  dm-db:
    build:
      context: ./dm-db
    container_name: dm-db
    environment:
      POSTGRES_DB: dm
      POSTGRES_USER: dm
      POSTGRES_PASSWORD: change-me-bootstrap-password
    volumes:
      - dm_postgres_data:/var/lib/postgresql
    networks:
      - dm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dm -d dm"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/etc/postgres/certs/dm-db.crt
      - -c
      - ssl_key_file=/etc/postgres/certs/dm-db.key
      - -c
      - ssl_ca_file=/etc/postgres/certs/ca.crt
      - -c
      - hba_file=/etc/postgres/pg_hba.conf

  dm:
    build:
      context: ./dm
    container_name: dm-app
    depends_on:
      dm-db:
        condition: service_healthy
    ports:
      - "7000:7000"
    working_dir: /app
    volumes:
      - ./dm:/app
      - dm_node_modules:/app/node_modules
    environment:
      SERVICE_NAME: dm
      HOST: 0.0.0.0
      PORT: 7000

      SSL_CERT_PATH: /app/certs/dm.crt
      SSL_KEY_PATH: /app/certs/dm.key
      SSL_CA_PATH: /app/certs/ca.crt

      USER_SERVICE_HOST: user
      USER_SERVICE_PORT: 7000
      SOCIAL_SERVICE_HOST: social
      SOCIAL_SERVICE_PORT: 7000

      DATABASE_URL_RUNTIME: postgresql://dm@dm-db:5432/dm
      DB_SSL_CA_PATH: /app/certs/ca.crt
      DB_SSL_CERT_PATH: /app/certs/dm.crt
      DB_SSL_KEY_PATH: /app/certs/dm.key

      PRISMA_DATABASE_URL: postgresql://dm@dm-db:5432/dm?schema=public&sslmode=require&sslcert=/app/certs/ca.crt&sslidentity=/app/certs/dm.p12&sslaccept=strict

    networks:
      - dm_net
    command: sh -c "npm install && npx prisma generate && npm run dev"

volumes:
  dm_postgres_data:
  dm_node_modules:

networks:
  dm_net: